project:
  name: juridical-innovation-agent
  root: .
  docs_dir: docs

sync:
  provider: openai  # Can be changed to 'gemini' or 'claude'
  model: gpt-4o     # High intelligence for legal texts
  
  include:
    - "docs/**/*.md"
    - "src/themis/**/*.py" # Analyze docstrings too

  exclude:
    - "README.md"
    - "CHANGELOG.md"
    - "**/*.pyc"
    - ".venv/**"

rules:
  - name: legal_consistency
    description: "Ensure all terms comply with LPI 9.279/96 definitions."
    severity: high
  
  - name: trl_alignment
    description: "Check if TRL classification matches NASA standards."
    severity: medium

quality:
  min_score: 80
  checks:
    - readability
    - structure
    - link_validity
